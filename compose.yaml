name: finspark

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: finspark
      POSTGRES_USER: finspark
      POSTGRES_PASSWORD: finspark
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finspark -d finspark"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')"]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  postgres-data:


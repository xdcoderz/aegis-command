name: aegis-command

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: aegis_command
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis-local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis_command"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      AEGIS_ENVIRONMENT: ${AEGIS_ENVIRONMENT:-development}
      AEGIS_LOG_LEVEL: ${AEGIS_LOG_LEVEL:-INFO}
      AEGIS_CORS_ORIGINS: '["http://localhost:5173"]'
      AEGIS_TRUSTED_HOSTS: '["localhost","127.0.0.1","api","testserver"]'
      AEGIS_DATABASE_URL: postgresql+asyncpg://aegis:aegis-local@postgres:5432/aegis_command
      AEGIS_AUTO_CREATE_SCHEMA: "false"
      AEGIS_MODEL_SEED: ${AEGIS_MODEL_SEED:-2026}
      AEGIS_MODEL_CONTAMINATION: ${AEGIS_MODEL_CONTAMINATION:-0.08}
      AEGIS_PQC_REQUIRED: "true"
      AEGIS_PQC_KEM_ALGORITHM: ML-KEM-768
      AEGIS_PQC_SIGNATURE_ALGORITHM: ML-DSA-65
      AEGIS_AUTH_ENABLED: "true"
      AEGIS_API_KEYS: '{"demo-analyst-key-2026":"analyst","demo-admin-key-2026":"admin"}'
      AEGIS_ENFORCEMENT_SANDBOX_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')"]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
        VITE_API_KEY: ${VITE_API_KEY:-demo-analyst-key-2026}
        VITE_ADMIN_API_KEY: ${VITE_ADMIN_API_KEY:-demo-admin-key-2026}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  postgres-data:

server {
  listen ${PORT};
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https: http://localhost:8000; img-src 'self' data:; style-src 'self'; script-src 'self';" always;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
